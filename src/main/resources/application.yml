server:
  port: 8080

spring:
  application:
    name: arm-audit-service
  datasource:
    url: jdbc:postgresql://localhost:5432/arm_audit
    username: arm_audit
    password: arm_audit_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

audit:
  python:
    executable: python3
    script-path: src/main/python/anomaly_detector.py
    timeout-seconds: 30

logging:
  level:
    com.arm.audit: INFO
    org.hibernate.SQL: WARN
